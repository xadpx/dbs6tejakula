<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup — Lembut Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:#F3F5FA;font-family:'Plus Jakarta Sans',sans-serif;}
  .frame{max-width:420px;margin:0 auto;min-height:100vh;}
  .card{background:#FFFFFF;box-shadow:0 1px 2px rgba(31,41,66,0.04), 0 10px 24px rgba(31,41,66,0.06);}
  .soft-blue{background:linear-gradient(135deg,#7C9CF2,#5B7CF0);}
  .soft-mint{background:linear-gradient(135deg,#6FD8B0,#4CC494);}
  .soft-peach{background:linear-gradient(135deg,#F5A992,#F0866B);}
</style>
</head>
<body>
<div class="frame pb-28">

  <div class="px-6 pt-8 pb-5 flex items-center justify-between">
    <div>
      <p class="text-[13px] font-semibold text-[#9AA1B4]">Selamat pagi</p>
      <h1 class="text-[25px] font-extrabold text-[#1C2140] mt-0.5">Ringkasan sekolah</h1>
    </div>
    <div class="w-11 h-11 rounded-full card flex items-center justify-center">
      <span class="text-[16px]">🌤️</span>
    </div>
  </div>

  <div class="px-6">
    <div class="card rounded-[28px] px-6 py-6 relative overflow-hidden">
      <p class="text-[12px] font-semibold text-[#9AA1B4]">Total siswa aktif</p>
      <div class="flex items-end gap-3 mt-1">
        <p class="text-[42px] font-extrabold text-[#1C2140] leading-none">184</p>
        <span class="text-[12px] font-bold text-[#4CC494] bg-[#EAFAF3] rounded-full px-2.5 py-1 mb-1">+3 bulan ini</span>
      </div>
      <div class="flex items-center gap-4 mt-5">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full soft-blue"></span>
          <span class="text-[12px] text-[#6B7189]">Laki-laki <b class="text-[#1C2140]">96</b></span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full soft-peach"></span>
          <span class="text-[12px] text-[#6B7189]">Perempuan <b class="text-[#1C2140]">88</b></span>
        </div>
      </div>
      <div class="h-2 rounded-full bg-[#EEF0F7] mt-3 overflow-hidden flex">
        <div class="h-full soft-blue" style="width:52%"></div>
        <div class="h-full soft-peach" style="width:48%"></div>
      </div>
    </div>
  </div>

  <div class="px-6 mt-5">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-[16px] font-bold text-[#1C2140]">Siswa per kelas</h2>
      <span class="text-[12px] font-semibold text-[#5B7CF0]">Salin</span>
    </div>
    <div class="card rounded-[24px] px-5 py-5">
      <svg viewBox="0 0 340 130" class="w-full">
        <g font-family="'Plus Jakarta Sans',sans-serif">
          <rect x="10" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="10" y="66" width="34" height="44" rx="10" fill="#5B7CF0"/>
          <text x="27" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K1</text>
          <text x="27" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">30</text>

          <rect x="65" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="65" y="58" width="34" height="52" rx="10" fill="#5B7CF0"/>
          <text x="82" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K2</text>
          <text x="82" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">32</text>

          <rect x="120" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="120" y="62" width="34" height="48" rx="10" fill="#5B7CF0"/>
          <text x="137" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K3</text>
          <text x="137" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">31</text>

          <rect x="175" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="175" y="66" width="34" height="44" rx="10" fill="#5B7CF0"/>
          <text x="192" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K4</text>
          <text x="192" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">30</text>

          <rect x="230" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="230" y="66" width="34" height="44" rx="10" fill="#5B7CF0"/>
          <text x="247" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K5</text>
          <text x="247" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">30</text>

          <rect x="285" y="20" width="34" height="90" rx="10" fill="#EAF0FF"/>
          <rect x="285" y="60" width="34" height="50" rx="10" fill="#5B7CF0"/>
          <text x="302" y="124" text-anchor="middle" font-size="10" fill="#9AA1B4">K6</text>
          <text x="302" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#1C2140">31</text>
        </g>
      </svg>
    </div>
  </div>

  <div class="px-6 mt-5">
    <div class="card rounded-[24px] px-5 py-5">
      <h2 class="text-[15px] font-bold text-[#1C2140] mb-4">Kesejahteraan siswa</h2>
      <div class="flex items-center gap-5">
        <svg viewBox="0 0 120 120" width="108" height="108">
          <circle cx="60" cy="60" r="46" fill="none" stroke="#EEF0F7" stroke-width="16"/>
          <circle cx="60" cy="60" r="46" fill="none" stroke="#F0866B" stroke-width="16" stroke-dasharray="57.8 231.2" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          <circle cx="60" cy="60" r="46" fill="none" stroke="#F5C15B" stroke-width="16" stroke-dasharray="81.5 289" stroke-dashoffset="-57.8" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          <circle cx="60" cy="60" r="46" fill="none" stroke="#6FD8B0" stroke-width="16" stroke-dasharray="105.2 289" stroke-dashoffset="-139.3" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          <circle cx="60" cy="60" r="46" fill="none" stroke="#5B7CF0" stroke-width="16" stroke-dasharray="239.5 289" stroke-dashoffset="-244.5" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          <text x="60" y="56" text-anchor="middle" font-size="20" font-weight="800" fill="#1C2140" font-family="'Plus Jakarta Sans',sans-serif">184</text>
          <text x="60" y="72" text-anchor="middle" font-size="9" fill="#9AA1B4" font-family="'Plus Jakarta Sans',sans-serif">siswa</text>
        </svg>
        <div class="text-[12px] text-[#6B7189] space-y-2">
          <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:#F0866B"></span>Desil 1 <b class="text-[#1C2140] ml-auto">22</b></div>
          <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:#F5C15B"></span>Desil 2 <b class="text-[#1C2140] ml-auto">31</b></div>
          <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:#6FD8B0"></span>Desil 3 <b class="text-[#1C2140] ml-auto">40</b></div>
          <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full" style="background:#5B7CF0"></span>Desil 6-10 <b class="text-[#1C2140] ml-auto">91</b></div>
        </div>
      </div>
    </div>
  </div>

  <div class="px-6 mt-5">
    <div class="card rounded-[24px] px-5 py-5">
      <h2 class="text-[15px] font-bold text-[#1C2140] mb-4">Status anak</h2>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-[12px] mb-1"><span class="text-[#6B7189] font-medium">Tidak ada</span><span class="text-[#1C2140] font-bold">160</span></div>
          <div class="h-2.5 rounded-full bg-[#EEF0F7] overflow-hidden"><div class="h-full soft-mint rounded-full" style="width:87%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-[12px] mb-1"><span class="text-[#6B7189] font-medium">Yatim / piatu</span><span class="text-[#1C2140] font-bold">24</span></div>
          <div class="h-2.5 rounded-full bg-[#EEF0F7] overflow-hidden"><div class="h-full soft-peach rounded-full" style="width:13%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <p class="text-center text-[11px] text-[#B0B5C6] pt-8 font-medium">SD Negeri 6 Tejakula · 2026</p>

  <nav class="fixed bottom-4 left-4 right-4 max-w-[388px] mx-auto card rounded-[26px] flex justify-around items-center h-[66px]">
    <div class="flex flex-col items-center gap-1">
      <div class="w-9 h-9 rounded-full soft-blue flex items-center justify-center text-white text-[15px]">🏠</div>
      <span class="text-[11px] font-bold text-[#1C2140]">Beranda</span>
    </div>
    <div class="flex flex-col items-center gap-1">
      <div class="w-9 h-9 flex items-center justify-center text-[15px] opacity-60">🎓</div>
      <span class="text-[11px] font-semibold text-[#9AA1B4]">Siswa</span>
    </div>
    <div class="flex flex-col items-center gap-1">
      <div class="w-9 h-9 flex items-center justify-center text-[15px] opacity-60">📥</div>
      <span class="text-[11px] font-semibold text-[#9AA1B4]">Unduh</span>
    </div>
  </nav>

</div>
</body>
</html>
